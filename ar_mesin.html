<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Mesin Industri</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

    #header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #header h1 { color: #fff; font-size: 16px; font-weight: 700; }

    #lang-bar { display: flex; gap: 6px; }
    .lang-btn {
      padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7);
      cursor: pointer;
    }
    .lang-btn.active { background: #fff; color: #000; }

    #model-bar {
      display: flex; gap: 8px; overflow-x: auto;
      padding: 12px 16px; scrollbar-width: none;
      background: #1a1a2e;
    }
    #model-bar::-webkit-scrollbar { display: none; }
    .model-btn {
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 14px; padding: 10px 16px;
      cursor: pointer; min-width: 80px;
    }
    .model-btn.active { border-color: #4fc3f7; background: rgba(79,195,247,0.15); }
    .model-btn .icon { font-size: 24px; }
    .model-btn .label { font-size: 10px; color: rgba(255,255,255,0.85); text-align: center; }

    #viewer-wrap {
      width: 100%; height: calc(100vh - 260px);
      position: relative; background: #0d0d1a;
    }

    model-viewer {
      width: 100%; height: 100%;
      background-color: transparent;
    }

    #info-panel {
      background: #16213e;
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    #info-name { font-size: 14px; font-weight: 700; color: #4fc3f7; margin-bottom: 4px; }
    #info-desc { font-size: 11px; color: rgba(255,255,255,0.65); line-height: 1.5; margin-bottom: 10px; }

    #voice-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(79,195,247,0.15);
      border: 1px solid rgba(79,195,247,0.4);
      border-radius: 50px; padding: 7px 16px;
      cursor: pointer;
    }
    #voice-btn:active { background: rgba(79,195,247,0.3); }
    #voice-btn .v-icon { font-size: 15px; }
    #voice-btn .v-label { font-size: 12px; color: #4fc3f7; font-weight: 600; }
    #voice-btn.speaking {
      background: rgba(255,59,48,0.15);
      border-color: rgba(255,59,48,0.4);
    }
    #voice-btn.speaking .v-label { color: #ff3b30; }

    #ar-hint {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff;
      padding: 8px 16px; border-radius: 20px; font-size: 11px;
      white-space: nowrap; pointer-events: none;
    }

    #loading-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
    }
    #loading-overlay p { color: #fff; font-size: 13px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="header">
  <h1 id="app-title">AR Mesin Industri</h1>
  <div id="lang-bar">
    <div class="lang-btn active" onclick="setLang('id',this)">ID</div>
    <div class="lang-btn" onclick="setLang('en',this)">EN</div>
    <div class="lang-btn" onclick="setLang('zh',this)">中文</div>
  </div>
</div>

<div id="model-bar">
  <div class="model-btn active" onclick="setModel('conveyor',this)">
    <span class="icon">⚙️</span>
    <span class="label" data-key="conveyor">Conveyor Belt</span>
  </div>
  <div class="model-btn" onclick="setModel('milling',this)">
    <span class="icon">🏗️</span>
    <span class="label" data-key="milling">Mesin Milling</span>
  </div>
  <div class="model-btn" onclick="setModel('generator',this)">
    <span class="icon">⚡</span>
    <span class="label" data-key="generator">Generator</span>
  </div>
  <div class="model-btn" onclick="setModel('bubut',this)">
    <span class="icon">🔩</span>
    <span class="label" data-key="bubut">Mesin Bubut</span>
  </div>
</div>

<div id="viewer-wrap">
  <model-viewer
    id="mv"
    src="Conveyor.glb"
    alt="Mesin Industri"
    auto-rotate
    camera-controls
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    shadow-intensity="1"
    exposure="1"
    animation-name="*"
    autoplay
  ></model-viewer>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">Memuat model...</p>
  </div>
  <div id="ar-hint">Tekan tombol AR di pojok kanan bawah untuk AR</div>
</div>

<div id="info-panel">
  <div id="info-name">Conveyor Belt</div>
  <div id="info-desc">Sistem transportasi material menggunakan belt bergerak yang didukung roller dan motor penggerak.</div>
  <div id="voice-btn" onclick="speakDesc()">
    <span class="v-icon">🔊</span>
    <span class="v-label" id="voice-label">Dengarkan</span>
  </div>
</div>

<script>
const lang = {
  id: {
    title: "AR Mesin Industri",
    loading: "Memuat model...",
    hint: "Tekan tombol AR di pojok kanan bawah untuk AR",
    voicePlay: "Dengarkan",
    voiceStop: "Berhenti",
    conveyor: "Conveyor Belt",
    bubut: "Mesin Bubut",
    milling: "Mesin Milling",
    cnc: "Mesin CNC",
    generator: "Generator",
    desc: {
      conveyor: "Sistem transportasi material menggunakan belt bergerak yang didukung roller dan motor penggerak.",
      bubut: "Mesin perkakas untuk membentuk benda kerja dengan cara memutar benda dan menyayat dengan pahat.",
      milling: "Mesin perkakas untuk menghilangkan material dari benda kerja menggunakan pisau berputar untuk membentuk permukaan atau profil tertentu.",
      cnc: "Mesin perkakas otomatis dikendalikan komputer untuk proses pemotongan dan pemesinan presisi.",
      generator: "Alat konversi energi mekanik menjadi energi listrik menggunakan prinsip induksi elektromagnetik."
    }
  },
  en: {
    title: "Industrial Machine AR",
    loading: "Loading model...",
    hint: "Tap AR button at bottom right for AR mode",
    voicePlay: "Listen",
    voiceStop: "Stop",
    conveyor: "Conveyor Belt",
    bubut: "Lathe Machine",
    milling: "Milling Machine",
    cnc: "CNC Machine",
    generator: "Generator",
    desc: {
      conveyor: "A material transport system using a moving belt supported by rollers and a drive motor.",
      bubut: "A machine tool that shapes workpieces by rotating and cutting with a tool bit.",
      milling: "A machine tool used to remove material from a workpiece using a rotating cutter to create flat surfaces or profiles.",
      cnc: "Computer-controlled machine tool for precision cutting and machining operations.",
      generator: "Converts mechanical energy into electrical energy using electromagnetic induction."
    }
  },
  zh: {
    title: "工业机械AR",
    loading: "加载模型中...",
    hint: "点击右下角AR按钮进入AR模式",
    voicePlay: "朗读",
    voiceStop: "停止",
    conveyor: "传送带",
    bubut: "车床",
    milling: "铣床",
    cnc: "数控机床",
    generator: "发电机",
    desc: {
      conveyor: "使用由滚轮和驱动电机支撑的移动皮带的物料运输系统。",
      bubut: "通过旋转工件并用刀具切削来成形工件的机床。",
      milling: "一种利用旋转刀具从工件上切除材料以加工平面或特定轮廓的机床。",
      cnc: "计算机控制的机床，用于精密切削和加工操作。",
      generator: "利用电磁感应原理将机械能转换为电能的装置。"
    }
  }
};

const voiceLang = { id: 'id-ID', en: 'en-US', zh: 'zh-CN' };
const models = {
  conveyor: 'Conveyor.glb',
  bubut: 'mesin_bubut.glb',
  milling: 'Miling.glb',
  cnc: 'mesin_cnc.glb',
  generator: 'Generator.glb'
};

let currentLang = 'id';
let currentModel = 'conveyor';
let speaking = false;

const mv = document.getElementById('mv');
const overlay = document.getElementById('loading-overlay');

mv.addEventListener('load', () => overlay.style.display = 'none');
mv.addEventListener('error', () => overlay.style.display = 'none');

function setLang(l, el) {
  window.speechSynthesis.cancel();
  speaking = false;
  updateVoiceBtn();
  currentLang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  updateUI();
}

function setModel(m, el) {
  window.speechSynthesis.cancel();
  speaking = false;
  updateVoiceBtn();
  currentModel = m;
  overlay.style.display = 'flex';
  document.getElementById('loading-text').textContent = lang[currentLang].loading;
  mv.src = models[m];
  document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  updateInfo();
}

function updateUI() {
  const t = lang[currentLang];
  document.getElementById('app-title').textContent = t.title;
  document.getElementById('ar-hint').textContent = t.hint;
  document.querySelectorAll('[data-key]').forEach(el => {
    const key = el.getAttribute('data-key');
    if (t[key]) el.textContent = t[key];
  });
  updateInfo();
  updateVoiceBtn();
}

function updateInfo() {
  const t = lang[currentLang];
  document.getElementById('info-name').textContent = t[currentModel];
  document.getElementById('info-desc').textContent = t.desc[currentModel];
}

function updateVoiceBtn() {
  const btn = document.getElementById('voice-btn');
  const label = document.getElementById('voice-label');
  const t = lang[currentLang];
  if (speaking) {
    btn.classList.add('speaking');
    label.textContent = t.voiceStop;
  } else {
    btn.classList.remove('speaking');
    label.textContent = t.voicePlay;
  }
}

function speakDesc() {
  if (speaking) {
    window.speechSynthesis.cancel();
    speaking = false;
    updateVoiceBtn();
    return;
  }
  const text = lang[currentLang].desc[currentModel];
  if (!text || !window.speechSynthesis) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = voiceLang[currentLang];
  utter.rate = 0.9;
  utter.onstart = () => { speaking = true; updateVoiceBtn(); };
  utter.onend = () => { speaking = false; updateVoiceBtn(); };
  utter.onerror = () => { speaking = false; updateVoiceBtn(); };
  window.speechSynthesis.speak(utter);
}

updateUI();
</script>
</body>
</html>
